# Application
spring.application.name=coffe-nerd
spring.profiles.active=dev

# Server
server.port=8080
server.servlet.context-path=/

# JWT Configuration
jwt.coffe.secret=${JWT_COFFE_SECRET}
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.nerdcoffe=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Security / CORS
app.security.allowed-origins=${ALLOWED_ORIGINS:http://localhost:80,http://localhost:3000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Mail Configuration (Mailtrap Sandbox placeholders)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAILTRAP_USERNAME}
spring.mail.password=${MAILTRAP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

