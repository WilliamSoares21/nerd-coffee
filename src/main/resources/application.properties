# Application
spring.application.name=coffe-nerd
spring.profiles.active=dev

# Server
server.port=8080
server.servlet.context-path=/

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate

# Database Configuration
spring.datasource.url=${COFFEDB_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/coffe_nerd_dev}}
spring.datasource.username=${COFFEDB_USERNAME:${DATABASE_USERNAME:postgres}}
spring.datasource.password=${COFFEDB_PASSWORD:${DATABASE_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT Configuration
jwt.coffe.secret=${JWT_COFFE_SECRET:${JWT_SECRET}}
jwt.expiration=86400000

# Frontend Configuration
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Logging
logging.level.root=INFO
logging.level.com.nerdcoffe=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Security / CORS
app.security.allowed-origins=${ALLOWED_ORIGINS:http://localhost:80,http://localhost:3000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mail.enabled=false

# Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Mail Configuration (Mailtrap Sandbox placeholders)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAILTRAP_USERNAME}
spring.mail.password=${MAILTRAP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

